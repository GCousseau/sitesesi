<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evento SESI Tech</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>Sesi Tech 2026</h1>
    </header>
    <main class="container">
        <section class="informacoes">
            <h2>Sobre o evento</h2>
            <p>
                Evento destinado a estudantes interessados em tecnologia, inovação e programação.
            </p>
        </section>
        <section class="formulario">
            <h2>Inscrição</h2>
            <form>
                <label>Nome Completo</label>
                <input type="text">
                <label>Email</label>
                <input type="email">
                <label>Idade</label>
                <input type="number">
                <label>Curso</label>
                <select>
                    <option>Desenvolvimento</option>
                    <option>Robótica</option>
                    <option>Automação</option>
                </select>

                <label>
                    <input type="checkbox">
                    Aceito os termos
                </label>
                <button type="submit">
                    Inscreva-se
                </button>
            </form>
        </section>
    </main>

</body>
</html>
